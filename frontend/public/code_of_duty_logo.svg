<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="450" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 32px; fill: #1a1a2e; letter-spacing: -0.5px; }
      .logo-subtext { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; fill: #9ca3af; letter-spacing: 4px; }
      .highlight { fill: url(#grad1); }
    </style>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Outer Shield / Chevron -->
    <path d="M40 0 L80 15 L80 50 C80 70 60 80 40 85 C20 80 0 70 0 50 L0 15 Z" fill="none" stroke="url(#grad1)" stroke-width="6" stroke-linejoin="round"/>
    
    <!-- Code Brackets Inside -->
    <path d="M28 32 L18 42 L28 52" fill="none" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M52 32 L62 42 L52 52" fill="none" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Forward Slash -->
    <path d="M46 25 L34 60" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Typography -->
  <text x="105" y="55" class="logo-text">CODE <tspan class="highlight">OF</tspan> DUTY</text>
  <text x="108" y="75" class="logo-subtext">ELITE ENGINEERING</text>
</svg>
